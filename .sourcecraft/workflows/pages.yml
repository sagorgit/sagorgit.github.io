name: Deploy MkDocs to SourceCraft Pages
on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install mkdocs mkdocs-material

      - name: Build site
        run: |
          cd source
          mkdocs build

      - name: Deploy to SourceCraft Pages
        uses: sourcecraft/pages-deploy-action@v1
        with:
          folder: source/site  # এখানে 'source/site' কারণ বিল্ড করার পর সাইটটি এখানে জমা হবে