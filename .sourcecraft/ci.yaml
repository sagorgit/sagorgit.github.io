on:
  push:
    - workflows: [build-site]
      filter:
        branches: ["main"]

workflows:
  build-site:
    tasks:
      - name: build-and-publish-site
        cubes:
          
          - name: checkout-code
            action: actions/checkout@v4

          
          - name: setup-python
            action: actions/setup-python@v5
            with:
              python-version: '3.x'

          
          - name: build-mkdocs-site
            script:
              - python -m pip install --upgrade pip
              - pip install mkdocs-material mkdocs
              - cd source && mkdocs build -d ../site && cd ..
              - echo "Сайт собран в папке ./site"
              - ls -la ./site
          
          
          - name: publish-to-release-branch
            script:
              - git config --global user.name "SourceCraft CI"
              - git config --global user.email "ci@sourcecraft.dev"
              - git checkout -b release
              - git add ./site --force
              - "git commit -m \"feat: автоматическое обновление сайта\""
              - "git push origin release -f"