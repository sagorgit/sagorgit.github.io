on:
  push:
    - workflows: [build-and-deploy]
      filter:
        branches: ["main"]

workflows:
  build-and-deploy:
    tasks:
      - name: build-and-deploy-task
        cubes:
          - name: checkout-code
            action: actions/checkout@v4

          - name: setup-python
            action: actions/setup-python@v5
            with:
              python-version: '3.x'

          - name: build-mkdocs
            script:
              - pip install mkdocs-material mkdocs
              - cd source
              - mkdocs build --site-dir ../public

          # GitHub-এর অ্যাকশনের বদলে SourceCraft-এর নিজস্ব অ্যাকশন ব্যবহার করছি
          - name: deploy-to-pages
            action: sourcecraft/pages-deploy-action@v1
            with:
              folder: public