on:
  push:
    - workflows: [build-workflow]
      filter:
        branches: ["main"]

workflows:
  build-workflow:
    tasks:
      - name: build-task
        artifacts:
          - name: site-output
            path: public
        cubes:
          - name: checkout
            action: actions/checkout@v4
          - name: setup-python
            action: actions/setup-python@v5
            with:
              python-version: '3.x'
          - name: build-docs
            script:
              - pip install mkdocs-material mkdocs
              - cd source
              - mkdocs build --site-dir ../public