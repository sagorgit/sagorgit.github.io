on:
  push:
    - workflows: [build-check]
      filter:
        branches: ["main", "master"]

workflows:
  build-check:
    tasks:
      - name: check
        cubes:
          # এখানে name যোগ করা হয়েছে
          - name: checkout-code
            action: actions/checkout@v4
            
          # এখানেও name যোগ করা হয়েছে
          - name: print-message
            script:
              - echo "Site files are already manually built and added in the source/site folder."