on:
  push:
    - workflows: [build-site]
      filter:
        branches: ["main", "master"]

workflows:
  build-site:
    tasks:
      - name: build-task
        cubes:
          - name: checkout
            action: actions/checkout@v4
          - name: setup-python
            action: actions/setup-python@v5
            with:
              python-version: '3.x'
          - name: build-mkdocs
            script:
              - pip install mkdocs-material mkdocs
              - cd source
              - mkdocs build --site-dir ../public