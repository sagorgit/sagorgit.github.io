on:
  push:
    - workflows: [build-workflow]
      filter:
        branches: ["main"]

workflows:
  build-workflow:
    tasks:
      - name: build-task
        cubes:
          - name: checkout
            action: actions/checkout@v4
          - name: setup-python
            action: actions/setup-python@v5
            with:
              python-version: '3.x'
          - name: build-docs
            script:
              - pip install mkdocs-material mkdocs
              - cd source
              - mkdocs build --site-dir ../public
        # এটি খুব গুরুত্বপূর্ণ: বিল্ড হওয়া ফাইলগুলোকে 'public' নামে সেভ রাখা
        artifacts:
          - name: public
            path: public